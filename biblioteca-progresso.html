*{

padding:0;

}

body{

color:#f2e2b8;

header{
text-align:center;
padding:60px 20px;
border-bottom:1px solid rgba(214,170,83,.3);
}

header h1{
font-family:'Cinzel',serif;
font-size:3.5rem;
color:#f5d48b;

margin-bottom:15px;
}

header p{
font-size:1.2rem;
max-width:900px;
margin:auto;
color:#d8c79d;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.top-bar{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

.btn-add{
background:#8f6b2c;
color:white;
padding:15px 25px;
border-radius:10px;
font-size:1rem;
border:none;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.btn-add:hover{
background:#d6aa53;
color:#22160c;
}

/* Filtros */
.filtros{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

.filtro-select{
background:#2a1f12;
border:1px solid #8f6b2c;
color:#f2e2b8;
padding:12px 20px;
border-radius:8px;
font-family:'Cormorant Garamond',serif;
font-size:1rem;
cursor:pointer;
min-width:200px;
}

.filtro-select option{
background:#2a1f12;
}

.busca-input{
background:#2a1f12;
border:1px solid #8f6b2c;
color:#f2e2b8;
padding:12px 20px;
border-radius:8px;
font-family:'Cormorant Garamond',serif;
font-size:1rem;
min-width:250px;
}

.busca-input::placeholder{
color:#8f6b2c;
}

.btn-limpar{
background:#4a3520;
color:#f2e2b8;
padding:12px 20px;
border-radius:8px;
border:1px solid #8f6b2c;
cursor:pointer;
transition:.3s;
}

.btn-limpar:hover{
background:#6b4f2c;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat{
background:rgba(35,25,15,.92);
border:1px solid #8f6b2c;
padding:20px;
border-radius:10px;
text-align:center;
backdrop-filter:blur(4px);
}

.stat h3{
font-size:1rem;
margin-bottom:10px;
color:#d8c79d;
letter-spacing:2px;
}

.stat span{
font-size:2rem;
color:#f5d48b;
font-weight:bold;
}

.table-box{
overflow-x:auto;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
background:rgba(25,18,10,.95);
border-radius:12px;
}

th{
background:#8f6b2c;
padding:15px;
font-family:'Cinzel',serif;
font-weight:600;
color:#22160c;
}

td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,.1);
text-align:center;
}

.progress{
width:100%;
height:20px;
background:#2a1f12;
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:#d6aa53;
border-radius:20px;
transition:width .3s;
}

.status-concluido{
color:#7cb342;
font-weight:bold;
}

.status-lendo{
color:#f5d48b;
}

.actions{
display:flex;
gap:10px;
justify-content:center;
}

.btn-small{
padding:8px 12px;
border-radius:6px;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.edit{
background:#2c6a9c;
}

.edit:hover{
background:#3a8bc9;
}

.remove{
background:#b13434;
}

.remove:hover{
background:#d44545;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#22160c;
border:2px solid #8f6b2c;
padding:30px;
border-radius:12px;
width:90%;
max-width:500px;
}

.modal-content h2{
font-family:'Cinzel',serif;
color:#f5d48b;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:15px;
background:#2a1f12;
color:#f2e2b8;
border:1px solid #8f6b2c;
border-radius:8px;
font-family:'Cormorant Garamond',serif;
font-size:1rem;
}

input:focus,select:focus{
outline:none;
border-color:#d6aa53;
}

.modal-buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.save{
background:#2f8a42;
color:white;
padding:12px;
flex:1;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.save:hover{
background:#3da855;

.cancel{

border:none;
border-radius:8px;

font-weight:bold;

<header>

<div class="container">

</div>

<div class="filtros">

</div>

</div>
<div class="stat">

</div>
</div>

<div class="table-box">

<thead>
<tr>
<th>Livro</th>

</tr>
</thead>
<tbody id="tabelaLivros">
</tbody>
</table>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content">

</select>

<input type="number" id="paginaAtual" placeholder="Página atual (0 para começar)" value="0">
<div id="infoPaginas" class="info-paginas"></div>

<div class="modal-buttons">
<button class="save" onclick="salvarLivro()">Salvar</button>
<button class="cancel" onclick="fecharModal()">Cancelar</button>
</div>
</div>
</div>

// BIBLIOTECA PESSOAL - SISTEMA COMPLETO
// ============================================

let biblioteca = JSON.parse(localStorage.getItem("bibliotecaLivros")) || [];

// Popular o select com os livros do catálogo
function popularSelectLivros() {
    const select = document.getElementById("nomeLivro");
    if (!select) return;
    
    select.innerHTML = '<option value="">Selecione um Livro</option>';
    
    const reinosOrder = ["Primeiro Alvorecer", "Sylvanora", "Voldoun", "Zaharam", "Solharis", "Silver Rise", "Nethis", "Lunaris", "Black Marsh"];
    
    for (const reino of reinosOrder) {
        const livrosDoReino = catalogoLivros.filter(l => l.reino === reino);
        if (livrosDoReino.length) {
            const optGroup = document.createElement("optgroup");
            optGroup.label = `📚 ${reino}`;
            livrosDoReino.forEach(livro => {
                const option = document.createElement("option");
                option.value = livro.nome;
                option.setAttribute("data-paginas", livro.paginas);
                option.setAttribute("data-reino", livro.reino);
                option.textContent = `${livro.nome} (${livro.paginas} páginas)`;
                optGroup.appendChild(option);
            });
            select.appendChild(optGroup);
        }
    }
}

// Atualizar info de páginas ao selecionar livro
function atualizarPaginasPorLivro() {
    const select = document.getElementById("nomeLivro");
    const selectedOption = select.options[select.selectedIndex];
    const infoDiv = document.getElementById("infoPaginas");
    
    if (selectedOption && selectedOption.value) {
        const paginas = selectedOption.getAttribute("data-paginas");
        const reino = selectedOption.getAttribute("data-reino");
        if (paginas) {
            infoDiv.innerHTML = `📖 Este livro possui <strong>${paginas}</strong> páginas.<br>🏛️ Reino: ${reino}`;
        }
    } else {
        infoDiv.innerHTML = "";
    }
}

// Salvar livro na biblioteca
function salvarLivro() {
    const select = document.getElementById("nomeLivro");
    const nome = select.value;
    const paginaAtual = parseInt(document.getElementById("paginaAtual").value) || 0;
    
    if (!nome) {
        alert("❌ Selecione um livro.");
        return;
    }
    
    const livroCatalogo = catalogoLivros.find(l => l.nome === nome);
    
    if (!livroCatalogo) {
        alert("❌ Livro não encontrado no catálogo.");
        return;
    }
    
    const existe = biblioteca.find(l => l.nome === nome);
    if (existe) {
        alert(`📕 "${nome}" já está na sua biblioteca!`);
        fecharModal();
        return;
    }
    
    biblioteca.push({
        nome: livroCatalogo.nome,
        paginas: livroCatalogo.paginas,
        atual: Math.min(paginaAtual, livroCatalogo.paginas),
        reino: livroCatalogo.reino,
        id: Date.now()
    });
    
    salvarLocal();
    renderizar();
    fecharModal();
    
    document.getElementById("paginaAtual").value = 0;
    document.getElementById("nomeLivro").value = "";
    document.getElementById("infoPaginas").innerHTML = "";
}

// Atualizar progresso do livro
function atualizarProgresso(id, novaPagina) {
    const livro = biblioteca.find(l => l.id === id);
    if (!livro) return;
    
    novaPagina = Math.min(Math.max(0, novaPagina), livro.paginas);
    livro.atual = novaPagina;
    
    salvarLocal();
    renderizar();
}

// Remover livro
function removerLivro(id) {
    const livro = biblioteca.find(l => l.id === id);
    if (!confirm(`❌ Remover "${livro?.nome}" da biblioteca?`)) return;
    
    biblioteca = biblioteca.filter(l => l.id !== id);
    salvarLocal();
    renderizar();
}

// Salvar no localStorage
function salvarLocal() {
    localStorage.setItem("bibliotecaLivros", JSON.stringify(biblioteca));
}

// Variáveis de filtro
let filtroReinoAtual = "";
let buscaNomeAtual = "";

function aplicarFiltros() {
    filtroReinoAtual = document.getElementById("filtroReino").value;
    buscaNomeAtual = document.getElementById("buscaNome").value.toLowerCase();
    renderizar();
}

function limparFiltros() {
    document.getElementById("filtroReino").value = "";
    document.getElementById("buscaNome").value = "";
    filtroReinoAtual = "";
    buscaNomeAtual = "";
    renderizar();
}

// Obter classe CSS do reino
function getReinoClass(reino) {
    const classes = {
        "Primeiro Alvorecer": "reino-Primeiro",
        "Sylvanora": "reino-Sylvanora",
        "Voldoun": "reino-Voldoun",
        "Zaharam": "reino-Zaharam",
        "Solharis": "reino-Solharis",
        "Silver Rise": "reino-Silver",
        "Nethis": "reino-Nethis",
        "Lunaris": "reino-Lunaris",
        "Black Marsh": "reino-Black"
    };
    return classes[reino] || "reino-Primeiro";
}

// Renderizar tabela
function renderizar() {
    const tabela = document.getElementById("tabelaLivros");
    if (!tabela) return;
    
    let livrosFiltrados = [...biblioteca];
    
    if (filtroReinoAtual) {
        livrosFiltrados = livrosFiltrados.filter(l => l.reino === filtroReinoAtual);
    }
    
    if (buscaNomeAtual) {
        livrosFiltrados = livrosFiltrados.filter(l => l.nome.toLowerCase().includes(buscaNomeAtual));
    }
    
    livrosFiltrados.sort((a, b) => {
        const aConcluido = a.atual >= a.paginas;
        const bConcluido = b.atual >= b.paginas;
        if (aConcluido !== bConcluido) return aConcluido ? 1 : -1;
        return a.nome.localeCompare(b.nome);
    });
    
    if (livrosFiltrados.length === 0) {
        tabela.innerHTML = `<tr><td colspan="6" class="vazio">📭 Nenhum livro encontrado...<br><small>Adicione livros clicando no botão acima</small></td></tr>`;
    } else {
        tabela.innerHTML = livrosFiltrados.map(livro => {
            const progresso = Math.floor((livro.atual / livro.paginas) * 100);
            const concluido = progresso >= 100;
            const reinoClass = getReinoClass(livro.reino);
            const incremento = Math.ceil(livro.paginas * 0.1);
            
            return `
                <tr>
                    <td style="text-align:left; font-weight:bold;">📖 ${livro.nome}</td>
                    <td><span class="reino-badge ${reinoClass}">${livro.reino}</span></td>
                    <td>${livro.atual} / ${livro.paginas}</td>
                    <td>
                        <div class="progress">
                            <div class="progress-fill" style="width:${progresso}%"></div>
                        </div>
                        <small>${progresso}%</small>
                    </td>
                    <td class="${concluido ? 'status-concluido' : 'status-lendo'}">
                        ${concluido ? '✅ Concluído' : '📖 Lendo'}
                    </td>
                    <td>
                        <div class="actions">
                            ${!concluido ? `<button class="btn-small edit" onclick="atualizarProgresso(${livro.id}, ${livro.atual + incremento})">+10%</button>` : ''}
                            <button class="btn-small remove" onclick="removerLivro(${livro.id})">🗑️</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join("");
    }
    
    const totalLivros = biblioteca.length;
    const concluidos = biblioteca.filter(l => l.atual >= l.paginas).length;
    const lendo = totalLivros - concluidos;
    const paginasLidas = biblioteca.reduce((acc, l) => acc + Math.min(l.atual, l.paginas), 0);
    
    document.getElementById("livrosTotal").innerText = totalLivros;
    document.getElementById("livrosConcluidos").innerText = concluidos;
    document.getElementById("livrosLeitura").innerText = lendo;
    document.getElementById("paginasLidas").innerText = paginasLidas.toLocaleString();
}

// Modal functions
function abrirModal() {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("paginaAtual").value = 0;
    document.getElementById("infoPaginas").innerHTML = "";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("nomeLivro").value = "";
    document.getElementById("paginaAtual").value = 0;
    document.getElementById("infoPaginas").innerHTML = "";
}

// Fechar modal clicando fora
document.getElementById("modal")?.addEventListener("click", function(e) {
    if (e.target === this) fecharModal();
});

// Inicialização
document.addEventListener("DOMContentLoaded", () => {
    popularSelectLivros();
    renderizar();
});

// Fechar modal com ESC
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") fecharModal();
});
